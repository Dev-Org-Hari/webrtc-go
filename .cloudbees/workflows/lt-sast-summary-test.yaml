name: lt-sast-summary-test
apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
on:
  workflow_dispatch:
permissions:
  scm-token-own: read
  scm-token-org: read
  id-token: write
jobs:
  scan-and-evaluate:
    outputs:
      policy-subject: ${{ steps.make-input.outputs.policy-subject }}
    steps:
      - id: make-input
        name: Build a test policy subject
        uses: docker://alpine:latest
        env:
          #REPO: ${{ cloudbees.scm.repositoryUrl }}
          REPO: "calculi-corp/none"
          COMMIT: ${{ cloudbees.scm.sha }}
        shell: sh
        run: |
          CRITICAL=10
          HIGH=25
          MEDIUM=0
          LOW=0
          TOTAL=$(( $CRITICAL + $HIGH + $MEDIUM + $LOW ))
          cat > "$CLOUDBEES_OUTPUTS/policy-subject" << EOF
          [{
            "type": "vulnerability_scan",
            "data": {
              "summary": {
                "by_severity": {
                  "total": ${TOTAL},
                  "critical": ${CRITICAL},
                  "high": ${HIGH},
                  "medium": ${MEDIUM},
                  "low": ${LOW}
                }
              }
            },
            "meta": [
              {
                "tool": "Security Scanner 1",
                "tool_version": "1.0",
                "tool_type": "sast_scan",
                "status": "COMPLETE",
                "scanned_at": "2026-07-16T15:30:43Z",
                "target": {
                  "type": "${REPO}",
                  "commit_sha": "${COMMIT}",
                  "repo": "https://github.com/Dev-Org-Hari/webrtc-go"
                }
              }
            ]
          }, {
            "type": "sast_scan",
            "data": {
              "completed": true
            },
            "meta": [
              {
                "tool": "Security Scanner 1",
                "tool_version": "1.0",
                "tool_type": "sast_scan",
                "status": "COMPLETE",
                "scanned_at": "2026-07-16T15:30:43Z",
                "target": {
                  "type": "${REPO}",
                  "commit_sha": "${COMMIT}",
                  "repo": "https://github.com/Dev-Org-Hari/webrtc-go"
                }
              }
            ]
          }]
          EOF
  do-something:
    needs:
      - scan-and-evaluate
    steps:
      - name: Print policy input
        uses: docker://alpine:latest
        shell: sh
        env:
          ORG: ${{ cloudbees.org.id }}
          ACCESS_KEY: ${{ cloudbees.api.token }}
          URL: ${{ cloudbees.api.url }}
          POLICY_SUBJECT: ${{ needs.scan-and-evaluate.outputs.policy-subject }}
        run: |
          echo "$URL"
          echo "$ORG"
          echo "Authorization: Bearer $ACCESS_KEY"
          echo "$POLICY_SUBJECT"