name: simple-policy-evaluation-direct-policy
apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
on:
  workflow_dispatch:
permissions:
  scm-token-own: read
  scm-token-org: read
  id-token: write
jobs:
  scan-and-evaluate:
    outputs:
      policy-subject: ${{ steps.gosec-step.outputs.policy-subject }}
    steps:
      - name: checkout-source-code
        uses: cloudbees-io/checkout@v1

      - name: Run Gosec Scan
        id: gosec-step
        uses: cloudbees-io/gosec-plugin@v1

      - id: print-gosec-outputs
        name: Print gosec outputs
        uses: docker://alpine:latest
        run: |
          echo "Gosec outputs:"
          echo "Critical: ${{ steps.gosec-step.outputs.critical-count }}"
          echo "Very high: ${{ steps.gosec-step.outputs.very-high-count }}"
          echo "High: ${{ steps.gosec-step.outputs.high-count }}"
          echo "Medium: ${{ steps.gosec-step.outputs.medium-count }}"
          echo "Low: ${{ steps.gosec-step.outputs.low-count }}"
          echo "Policy Subject: ${{ steps.gosec-step.outputs.policy-subject }}"
  policy-evaluation:
    uses: cloudbees-io/policy-utils/evaluate-policy/workflow.yml@v2
    needs:
      - scan-and-evaluate
    with:
      policy-id: "7232af51-4c0d-423c-959d-8d778b1df1d1"
      input-data: ${{ needs.scan-and-evaluate.outputs.policy-subject }}
      checkpoint-type: workflow
      checkpoint-position: within
