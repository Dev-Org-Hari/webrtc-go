  name: andy-enhanced-required-sast-scan-noscan
  apiVersion: automation.cloudbees.io/v1alpha1
  kind: workflow
  on:
    workflow_dispatch: {}
  permissions:
    id-token: write
  jobs:
    print-context:
      steps:
        - name: Print CloudBees context
          uses: docker://alpine:latest
          shell: sh
          env:
            API_URL:      ${{ cloudbees.api.url }}
            ACCESS_TOKEN: ${{ cloudbees.api.token }}
            COMPONENT_ID: ${{ cloudbees.component.id }}
            ORG_ID:       ${{ cloudbees.org.id }}
            RUN_ID:       ${{ cloudbees.run_id }}
            SCM_BRANCH:   ${{ cloudbees.scm.branch }}
            SCM_REPO:     ${{ cloudbees.scm.repository }}
            SCM_SHA:      ${{ cloudbees.scm.sha }}
          run: |
            echo "=== CloudBees Context ==="
            echo "api.url:          $API_URL"
            echo "api.token:        ${ACCESS_TOKEN:0:10}... (truncated)"
            echo "component.id:     $COMPONENT_ID"
            echo "org.id:           $ORG_ID"
            echo "run_id:           $RUN_ID"
            echo "scm.branch:       $SCM_BRANCH"
            echo "scm.repository:   $SCM_REPO"
            echo "scm.sha:          $SCM_SHA"
    scan-and-evaluate:
      outputs:
         policy-subject: "[]"
      steps:
        - name: No scan here
          uses: docker://alpine:latest
          shell: sh
          run: echo "No scan here.."
    policy-evaluation:
      uses: cloudbees-io/policy-utils/evaluate-policy-context/workflow.yml@v1
      needs:
        - scan-and-evaluate
      with:
        input-data: ${{ needs.scan-and-evaluate.outputs.policy-subject }}
        checkpoint-type: workflow
        checkpoint-position: within            
    build: 
      needs: policy-evaluation
      steps:
        - name: Build something
          uses: docker://alpine:latest
          shell: sh
          run: echo "Building..."


