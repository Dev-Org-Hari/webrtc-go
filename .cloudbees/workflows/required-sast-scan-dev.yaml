  name: 52203-required-sast-scan-dev
  apiVersion: automation.cloudbees.io/v1alpha1
  kind: workflow
  on:
    workflow_dispatch: {}
  permissions:
    id-token: write
  jobs:
    print-context:
      steps:
        - name: Print CloudBees context
          uses: docker://alpine:latest
          shell: sh
          env:
            API_URL:      ${{ cloudbees.api.url }}
            ACCESS_TOKEN: ${{ cloudbees.api.token }}
            COMPONENT_ID: ${{ cloudbees.component.id }}
            ORG_ID:       ${{ cloudbees.org.id }}
            RUN_ID:       ${{ cloudbees.run_id }}
            SCM_BRANCH:   ${{ cloudbees.scm.branch }}
            SCM_REPO:     ${{ cloudbees.scm.repository }}
            SCM_SHA:      ${{ cloudbees.scm.sha }}
          run: |
            echo "=== CloudBees Context ==="
            echo "api.url:          $API_URL"
            echo "api.token:        ${ACCESS_TOKEN:0:10}... (truncated)"
            echo "component.id:     $COMPONENT_ID"
            echo "org.id:           $ORG_ID"
            echo "run_id:           $RUN_ID"
            echo "scm.branch:       $SCM_BRANCH"
            echo "scm.repository:   $SCM_REPO"
            echo "scm.sha:          $SCM_SHA"
    scan-and-evaluate:
      steps:
      - name: Run Gosec Scan 1
        id: gosec-step-1
        uses: cloudbees-io/gosec-plugin@v2

      # Printing output for testing purpose
      - id: print-gosec-outputs-1
        name: Print gosec outputs 1
        uses: docker://alpine:latest
        run: |
          echo "Gosec outputs:"
          echo "Critical: ${{ steps.gosec-step-1.outputs.critical-count }}"
          echo "Very high: ${{ steps.gosec-step-1.outputs.very-high-count }}"
          echo "High: ${{ steps.gosec-step-1.outputs.high-count }}"
          echo "Medium: ${{ steps.gosec-step-1.outputs.medium-count }}"
          echo "Low: ${{ steps.gosec-step-1.outputs.low-count }}"
          echo "Policy Subject: ${{ steps.gosec-step-1.outputs.policy-subject }}"        
