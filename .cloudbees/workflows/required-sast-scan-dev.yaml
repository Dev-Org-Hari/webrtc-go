  name: 52203-required-sast-scan-dev
  apiVersion: automation.cloudbees.io/v1alpha1
  kind: workflow
  on:
    workflow_dispatch: {}
  permissions:
    id-token: write
  jobs:
    print-context:
      steps:
        - name: Print CloudBees context
          uses: docker://alpine:latest
          shell: sh
          env:
            ORG_ID: ${{ cloudbees.org.id }}
            API_URL: ${{ cloudbees.api.url }}
            ACCESS_TOKEN: ${{ cloudbees.api.token }}
            WORKFLOW_ID: ${{ cloudbees.workflow.id }}
            WORKFLOW_RUN_ID: ${{ cloudbees.workflow.run.id }}
            COMPONENT_ID: ${{ cloudbees.component.id }}
            SCM_URL: ${{ cloudbees.scm.url }}
            SCM_TOKEN: ${{ cloudbees.scm.token }}
          run: |
            echo "=== CloudBees Context ==="
            echo "org.id:              $ORG_ID"
            echo "api.url:             $API_URL"
            echo "api.token:           ${ACCESS_TOKEN:0:10}... (truncated)"
            echo "workflow.id:         $WORKFLOW_ID"
            echo "workflow.run.id:     $WORKFLOW_RUN_ID"
            echo "component.id:        $COMPONENT_ID"
            echo "scm.url:             $SCM_URL"
            echo "scm.token:           ${SCM_TOKEN:0:10}... (truncated)"
